<!DOCTYPE html>
<html>
<head>
<title>Reset Password - Cop Friendly e-Seva</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:linear-gradient(120deg,#0f2027,#203a43,#2c5364);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* CONTAINER */

.box{
background:rgba(255,255,255,0.12);
backdrop-filter:blur(10px);
padding:35px;
border-radius:12px;
width:320px;
text-align:center;
box-shadow:0 5px 20px rgba(0,0,0,0.5);
}

/* TITLE */

h3{
margin-bottom:20px;
color:#ffffff;
}

/* INPUT */

input{
width:100%;
padding:11px;
margin:10px 0;
border:none;
border-radius:6px;
outline:none;
}

/* BUTTON */

button{
width:100%;
padding:11px;
background:linear-gradient(to right,#22c55e,#1cad52);
border:none;
color:white;
border-radius:6px;
cursor:pointer;
font-size:15px;
transition:0.3s;
}

button:hover{
background:linear-gradient(to right,#16a34a,#22c55e);
transform:scale(1.05);
}

/* BACK LINK */

.back{
display:block;
margin-top:15px;
color:#00c6ff;
text-decoration:none;
font-size:14px;
}

.back:hover{
text-decoration:underline;
}

</style>

</head>

<body>

<div class="box">

<h3>Reset Password</h3>

<form action="reset_password.php" method="post">

<input type="email" name="email" placeholder="Enter your email" required>

<input type="password" name="new_password" placeholder="Enter new password" required minlength="6">

<button type="submit">Reset Password</button>

</form>

<a href="login.html" class="back">Back to Login</a>

</div>

</body>
</html>
